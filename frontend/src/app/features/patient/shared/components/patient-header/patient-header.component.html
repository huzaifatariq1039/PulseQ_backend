<header class="topbar">
    <!-- Mobile Hamburger -->
    <button class="mobile-menu-btn" (click)="toggleMenu()" *ngIf="!mobileMenuOpen">
        <i class="pi pi-bars"></i>
    </button>

    <div class="topbar-left">
        <img src="assets/logo.jpeg" alt="PulseQ" class="logo" />
        <div class="brand">PulseQ</div>
    </div>

    <nav class="topnav mobile-dropdown" [class.open]="mobileMenuOpen">
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}"
            (click)="mobileMenuOpen=false">Dashboard</a>
        <a routerLink="/new-token" routerLinkActive="active" (click)="mobileMenuOpen=false">New Token</a>
        <a routerLink="/live-status" routerLinkActive="active" (click)="mobileMenuOpen=false">Live Status</a>
        <a routerLink="/my-token" routerLinkActive="active" (click)="mobileMenuOpen=false">My Token</a>
        <a routerLink="/history" routerLinkActive="active" (click)="mobileMenuOpen=false">History</a>
    </nav>

    <!-- Close button for mobile menu -->
    <button class="mobile-close-btn" (click)="toggleMenu()" *ngIf="mobileMenuOpen">
        <i class="pi pi-times"></i>
    </button>

    <div class="topbar-right">
        <div class="notif-wrapper">
            <a pButton type="button" icon="pi pi-bell" class="p-button-text" routerLink="/notifications"
                aria-label="Notifications">
            </a>
            <span class="notif-badge" *ngIf="unreadCount > 0">
                {{ unreadCount > 99 ? '99+' : unreadCount }}
            </span>
        </div>
        <a routerLink="/profile" class="avatar" title="Profile">
            <i class="pi pi-user" aria-hidden="true"></i>
        </a>
    </div>
</header>

<!-- Mobile menu overlay -->
<div class="mobile-menu-overlay" *ngIf="mobileMenuOpen" (click)="toggleMenu()"></div>
