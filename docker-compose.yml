version: '3.8'

services:
  smart-token-backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_TYPE=firebase
    volumes:
      - ./smart-token-247bb-firebase-adminsdk-fbsvc-b793f6e6af.json:/app/smart-token-247bb-firebase-adminsdk-fbsvc-b793f6e6af.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
